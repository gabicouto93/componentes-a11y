<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mensagem enviada com sucesso para o projeto Componentes A11Y.">
    <title>Mensagem enviada - Componentes A11Y</title>
    <link rel="stylesheet" href="../css/index.css">
    <script src="../scripts/acessibilidade.js" defer></script>
    <style>
        .pagina-obrigado {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem 1rem;
        }

        .cartao-obrigado {
            width: min(100%, 42rem);
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
        }

        .acoes-obrigado {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .link-botao {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0.75rem 1rem;
            border-radius: 0.6rem;
            background: #1d4ed8;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
        }

        .link-botao.secundario {
            background: #0f172a;
        }

        .link-botao:focus-visible {
            outline: 3px solid #0b5cad;
            outline-offset: 3px;
        }

        @media (max-width: 640px) {
            .cartao-obrigado {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <main class="pagina-obrigado" id="conteudo-principal">
        <section class="cartao-obrigado" aria-labelledby="obrigado-heading">
            <h1 id="obrigado-heading">Mensagem enviada</h1>
            <p>Obrigado pelo contato. Sua mensagem foi recebida e será analisada pela equipe do projeto.</p>
            <div class="acoes-obrigado">
                <a class="link-botao" href="../index.html">Voltar para a home</a>
                <a class="link-botao secundario" href="contato.html">Voltar para contato</a>
            </div>
        </section>
    </main>
</body>
</html>
